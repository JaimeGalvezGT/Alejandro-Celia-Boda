<html lang="es">

<head>

<meta charset="UTF-8">

<title>Alejandro & Celia | Nuestra Boda</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/reset.css">

<body>


<header class="hero">

    <div class="hero-overlay"></div>

    <div id="welcomeOverlay" class="welcome-overlay">

    <div class="welcome-card">

        <p class="welcome-small">
            Tenemos el honor de invitar a
        </p>

        <h2 id="guestName"></h2>

        <p class="welcome-seats">

            Esta invitación incluye

            <strong id="guestSeats"></strong>

        </p>

        <button
            id="enterInvitation"
            class="btn btn-primary">

            Abrir Invitación

        </button>

    </div>

</div>

    <div class="hero-content container">

        <p class="hero-blessing">
            Con la bendición de Dios
        </p>

        <h1 class="hero-title">

            <span id="groom"></span>

            <small>&</small>

            <span id="bride"></span>

        </h1>

        <p class="hero-date" id="date"></p>

        <button class="btn btn-primary" id="openInvitation">

            Abrir Invitación

        </button>

    </div>

</header>

<audio id="backgroundMusic" loop></audio>

<script src="js/config.js"></script>
<script src="js/guests.js"></script>
